<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Acervo Street</title>
</head>


<body>

    <header class="header-principal">
        <!-- Navegação Superior -->
        <nav class="header-nav">
            <div class="nav-inicio">
                <a href="index.html" class="link-nav">Início</a>
            </div>

            <div class="logo-container">
                <h1 class="logo">ACERVO STREET</h1>
            </div>

            <div class="nav-lista">
                <button id="btn-curtidos" class="btn-icon">
                    ❤ <span class="texto-wishlist">Lista de Desejos</span> <span id="contador-curtidas">0</span>
                </button>
            </div>
        </nav>

        <!-- Banner Principal com Mascote e Logo -->
        <div class="header-banner">
            <div class="grupo-marca">
                <img src="imgs_artes/Mascote.png" alt="Mascote" class="mascote-header">
                <a href="index.html"><img src="imgs_artes/Logo.png" alt="Acervo Street Tag" class="logo-tag"></a>
            </div>
        </div>
</header>

    <div class="busca-container">
    <input type="text" id="campo-busca" placeholder="O que você procura?">
    </div>

    <nav class="filtros-container">
        <button class="btn-filtro ativo" data-categoria="todos">Todos</button>
        <button class="btn-filtro" data-categoria="camisetas">Camisetas</button>
        <button class="btn-filtro" data-categoria="calcas">Bermudas/Calças</button>
        <button class="btn-filtro" data-categoria="moletom">Moletom</button>
    </nav>

    <main>
    <section class="produtos-grid" id="vitrine-produtos">
    </section></main>

    <footer>
       <div>
        <p>Feito por Felipe Oliveira</p>
       </div>   
        <div class="redes-sociais">
        <a href="https://github.com/feslispes" target="_blank"><img class="icone" src="imgs/free-github-logo.PNG" alt="GitHub"></a>
        <a href="https://www.instagram.com/_feslispes_/" target="_blank"><img class="icone" src="imgs/instagram-logo-orig.png" alt="Instagram"></a>
        <a href="https://www.linkedin.com/in/felipe-oliveira-contato/" target="_blank"><img class="icone" src="imgs/linkedin-logo-black-white.png" alt="LinkedIn"></a>
        <a href="https://www.twitch.tv/feslispes" target="_blank"><img class="icone" src="imgs/logo-twitch.png" alt="Twitch"></a>
       </div>
        
    </footer>

    <div id="wishlist-overlay" class="overlay"></div>

<aside id="wishlist-sidebar" class="sidebar">
    <div class="sidebar-header">
        <h2>Meus Favoritos</h2>
        <button id="btn-fechar-wishlist">×</button>
    </div>
    
    <div id="lista-favoritos" class="sidebar-content">
        </div>

    <div class="sidebar-footer" id="sidebar-footer">
    </div>
    
</aside>

    <script src="produtos.js"></script>
    <script src="script.js"></script>

</body>

</html>
